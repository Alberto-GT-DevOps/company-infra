name: "Terraform CI/CD"

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Action (Apply or destroy)'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/prod

    env:
      #AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY }}
      #AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::045306125645:role/github-actions-role
          aws-region: us-west-2
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init
    
      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        run: terraform plan -no-color -input=false

      - name: Terraform Action
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          ACTION=${{ github.event.inputs.terraform_action || 'apply' }} 
          echo "Executing: terraform $ACTION"
          terraform $ACTION -auto-approve -input=false
